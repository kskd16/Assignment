spring.application.name=circuit-breaker

server.port= 8080
resilience4j.circuitbreaker.instances.demoService.failure-rate-threshold= 50


resilience4j.circuitbreaker.instances.demoService.sliding-window-size= 6


resilience4j.circuitbreaker.instances.demoService.minimum-number-of-calls= 6


resilience4j.circuitbreaker.instances.demoService.wait-duration-in-open-state= 8s

resilience4j.circuitbreaker.instances.demoService.permitted-number-of-calls-in-half-open-state=2

management.endpoints.web.exposure.include = *

management.endpoint.health.show-details= always






